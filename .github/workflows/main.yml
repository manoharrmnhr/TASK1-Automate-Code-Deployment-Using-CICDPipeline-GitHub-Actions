name: CI/CD Pipeline

# Trigger: every push to main runs the full pipeline.
# Pull requests into main only run the test job (no image push) so broken
# PRs can't accidentally publish an image.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-demo-app

jobs:
  # ---------------------------------------------------------------------
  # Job 1: TEST — install deps and run the Jest suite
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------------------
  # Job 2: BUILD & PUSH — only runs on a real push to main (not on PRs),
  # and only after the test job succeeds.
  # ---------------------------------------------------------------------
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  # Job 3: DEPLOY — placeholder. Wire this to wherever the container
  # actually runs (EC2, ECS, a VM, etc). The commented block below shows
  # the EC2-over-SSH pattern, which pairs with the EC2 instance you
  # already stood up for the AWS module work — just point EC2_HOST at it.
  # ---------------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy step placeholder
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Add a real deploy step below once you have a target host."

